# Agent memory — machine-readable project profile
# Updated by apply.py, register_subsystem.py, and scripts/stack_detect.py --sync
# See GROWTH.md for maturity level definitions.

maturity_level: "{{MATURITY_LEVEL}}"
project_name: "{{PROJECT_NAME}}"
stack: "{{STACK_SUMMARY}}"
stack_signals: []
stack_manual_append: []
stack_last_sync: "{{DATE}}"
stack_profile:
  auto_detect: true
primary_config: "{{PRIMARY_CONFIG}}"
src_roots:
  - "{{SRC_ROOT}}"
default_test_command: "{{DEFAULT_TEST_COMMAND}}"
last_bootstrapped: "{{DATE}}"

subsystems:
  - slug: core
    title: Core
    doc: docs/CORE.md
    paths:
      - "{{SRC_ROOT}}**"
    test: "{{DEFAULT_TEST_COMMAND}}"

integrity:
  required_docs:
    - AGENTS.md
    - docs/README.md
    - docs/SUBSYSTEM_TEMPLATE.md
    - docs/BACKLOG.md
    - docs/FINDINGS.md
    - docs/CORE.md
  optional_docs:
    - docs/API_CATALOG.md
    - docs/GROWTH.md

proposals:
  enabled: true
  index: docs/proposals/README.md

test_discipline:
  never_weaken_tests: true
  doc_regression: "python3 -m pytest tests/test_docs_integrity.py -q"
  integrity_script: "python3 scripts/docs_integrity.py"
